<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chara Dialog</title>
    <style>
        body {
            margin: 0;
            background-color: black;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            user-select: none;
            cursor: pointer; /* Показывает, что кликать можно везде */
        }

        .character-container {
            margin-bottom: 30px;
        }

        img {
            image-rendering: pixelated;
            width: 140px;
            height: auto;
            display: block;
        }

        .textbox {
            width: 85%;
            max-width: 500px;
            min-height: 120px;
            border: 4px solid white;
            background-color: black;
            padding: 15px;
            box-sizing: border-box;
            display: none;
        }

        .text-content {
            color: white;
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 1px;
            line-height: 1.4;
            margin: 0;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

    <div class="character-container">
        <img src="Chara.png" alt="Chara">
    </div>

    <div class="textbox" id="dialogBox">
        <p class="text-content" id="dialogText"></p>
    </div>

    <script>
        const phrases = [
            "* Приветствую.",
            "* Я Чара.",
            "* Спасибо тебе.",
            "* Твоя сила пробудила меня от смерти.",
            "* Давай сотрем этот бесполезный мир..."
        ];

        let currentLine = 0;
        let isTyping = false;
        let typingTimeout;
        let dialogStarted = false;

        const dialogBox = document.getElementById('dialogBox');
        const dialogText = document.getElementById('dialogText');

        function typeText(text, index = 0) {
            if (index < text.length) {
                isTyping = true;
                dialogText.textContent += text[index];
                typingTimeout = setTimeout(() => typeText(text, index + 1), 40);
            } else {
                isTyping = false;
            }
        }

        function handleGlobalClick() {
            // Если диалог еще не начат — запускаем его
            if (!dialogStarted) {
                dialogStarted = true;
                dialogBox.style.display = "block";
                dialogText.textContent = "";
                currentLine = 0;
                typeText(phrases[0]);
                return;
            }

            // Если текст еще печатается — мгновенно допечатываем строку
            if (isTyping) {
                clearTimeout(typingTimeout);
                dialogText.textContent = phrases[currentLine];
                isTyping = false;
                return;
            }

            // Переходим к следующей строке
            currentLine++;

            if (currentLine < phrases.length) {
                dialogText.textContent = "";
                typeText(phrases[currentLine]);
            } else {
                // Конец диалога — полностью сбрасываем состояние
                dialogBox.style.display = "none";
                dialogText.textContent = "";
                currentLine = 0;
                dialogStarted = false;
            }
        }

        // Ловим клик в абсолютно любом месте экрана
        document.body.addEventListener('click', handleGlobalClick);
    </script>
</body>
</html>
