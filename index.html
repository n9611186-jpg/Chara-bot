<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chara Final Cutscene</title>
    <style>
        body { margin: 0; background-color: black; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Courier New', monospace; user-select: none; }
        .shake-screen { animation: shake 0.05s infinite !important; }
        .flash-red { animation: flash 0.1s infinite !important; }
        @keyframes shake { 0% { transform: translate(5px, 3px) rotate(0deg); } 20% { transform: translate(-4px, -3px) rotate(-1deg); } 40% { transform: translate(-6px, 0px) rotate(1deg); } 60% { transform: translate(0px, 5px) rotate(0deg); } 80% { transform: translate(4px, -3px) rotate(1deg); } 100% { transform: translate(-3px, 4px) rotate(-1deg); } }
        @keyframes flash { 0% { background-color: #ff0000; } 50% { background-color: #000000; } 100% { background-color: #550000; } }
        .character-container { cursor: pointer; margin-bottom: 30px; padding: 10px; -webkit-tap-highlight-color: transparent; z-index: 10; width: 140px; height: 230px; display: flex; justify-content: center; align-items: center; }
        img { image-rendering: pixelated; height: 230px; width: auto; display: block; pointer-events: none; transition: transform 0.05s linear; }
        .textbox { width: 85%; max-width: 500px; min-height: 120px; border: 4px solid white; background-color: black; padding: 15px; box-sizing: border-box; display: none; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .text-content { color: white; font-size: 20px; font-weight: bold; letter-spacing: 1px; line-height: 1.4; margin: 0; white-space: pre-wrap; }
        .choices-container { display: none; justify-content: space-around; width: 85%; max-width: 500px; margin-top: 20px; }
        .choice-btn { background-color: black; color: white; border: 2px solid white; padding: 10px 20px; font-size: 18px; font-weight: bold; cursor: pointer; font-family: 'Courier New', monospace; -webkit-tap-highlight-color: transparent; }
        .choice-btn:hover, .choice-btn:active { color: #ff9d00; border-color: #ff9d00; }
    </style>
</head>
<body>
    <div class="character-container" onclick="handleCharaClick()"><img src="Chara.png" id="charaImg" alt="Chara"></div>
    <div class="textbox" id="dialogBox" onclick="handleDialogClick()"><p class="text-content" id="dialogText"></p></div>
    <div class="choices-container" id="choicesBox"><button class="choice-btn" onclick="makeChoice('erase')">[ СТЕРЕТЬ ]</button><button class="choice-btn" onclick="makeChoice('do_not')">[ НЕ СТЕРЕТЬ ]</button></div>
    
    <!-- Подключаем наш скрипт из отдельного файла -->
    <script src="script.js"></script>
</body>
</html>
