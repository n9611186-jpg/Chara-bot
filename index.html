<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chara Dialog</title>
    <style>
        body {
            margin: 0;
            background-color: black;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            user-select: none;
        }

        .character-container {
            cursor: pointer;
            margin-bottom: 30px;
            transition: transform 0.1s;
        }
        .character-container:active {
            transform: scale(0.95);
        }

        img {
            image-rendering: pixelated;
            width: 140px; /* Чуть увеличил Чару для красоты */
            height: auto;
            display: block;
        }

        /* Окно Undertale с авто-подстройкой под высоту текста */
        .textbox {
            width: 85%;
            max-width: 500px;
            min-height: 120px; /* Увеличили высоту, чтобы текст не вылезал */
            border: 4px solid white;
            background-color: black;
            padding: 15px;
            box-sizing: border-box;
            display: none;
            position: relative;
            cursor: pointer;
        }

        .text-content {
            color: white;
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 1px;
            line-height: 1.4;
            margin: 0;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

    <div class="character-container" id="charaBtn">
        <img src="Chara.png" alt="Chara">
    </div>

    <div class="textbox" id="dialogBox">
        <p class="text-content" id="dialogText"></p>
    </div>

    <script>
        const phrases = [
            "* Приветствую.",
            "* Я Чара.",
            "* Спасибо тебе.",
            "* Твоя сила пробудила меня от смерти.",
            "* Давай сотрем этот бесполезный мир..."
        ];

        let currentLine = 0;
        let isTyping = false;
        let typingTimeout;

        const charaBtn = document.getElementById('charaBtn');
        const dialogBox = document.getElementById('dialogBox');
        const dialogText = document.getElementById('dialogText');

        function typeText(text, index = 0) {
            if (index < text.length) {
                isTyping = true;
                dialogText.textContent += text[index];
                typingTimeout = setTimeout(() => typeText(text, index + 1), 40); // Скорость печати
            } else {
                isTyping = false;
            }
        }

        function advanceDialog() {
            // Если текст еще печатается, то клик мгновенно показывает его полностью
            if (isTyping) {
                clearTimeout(typingTimeout);
                dialogText.textContent = phrases[currentLine];
                isTyping = false;
                return;
            }

            currentLine++;

            if (currentLine < phrases.length) {
                dialogText.textContent = "";
                typeText(phrases[currentLine]);
            } else {
                // Конец диалога — закрываем окно
                dialogBox.style.display = "none";
                dialogText.textContent = "";
                currentLine = 0;
            }
        }

        // Клик по Чаре ТОЛЬКО открывает диалог в самый первый раз
        charaBtn.addEventListener('click', () => {
            if (dialogBox.style.display === "none") {
                dialogBox.style.display = "block";
                dialogText.textContent = "";
                currentLine = 0;
                typeText(phrases[0]);
            }
        });

        // Дальше листаем строго кликами по самому текстовому окну
        dialogBox.addEventListener('click', (e) => {
            e.stopPropagation(); // Защита от дублирования кликов
            advanceDialog();
        });
    </script>
</body>
</html>
