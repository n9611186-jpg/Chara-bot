<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chara Choice</title>
    <style>
        body {
            margin: 0;
            background-color: black;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            user-select: none;
            transition: background-color 0.1s;
        }

        .character-container {
            cursor: pointer;
            margin-bottom: 30px;
            padding: 10px;
            -webkit-tap-highlight-color: transparent;
        }

        img {
            image-rendering: pixelated;
            width: 140px;
            height: auto;
            display: block;
            pointer-events: none;
        }

        .textbox {
            width: 85%;
            max-width: 500px;
            min-height: 120px;
            border: 4px solid white;
            background-color: black;
            padding: 15px;
            box-sizing: border-box;
            display: none;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .text-content {
            color: white;
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 1px;
            line-height: 1.4;
            margin: 0;
            white-space: pre-wrap;
        }

        /* Контейнер для кнопок выбора */
        .choices-container {
            display: none; /* Изначально скрыт */
            justify-content: space-around;
            width: 85%;
            max-width: 500px;
            margin-top: 20px;
        }

        .choice-btn {
            background-color: black;
            color: white;
            border: 2px solid white;
            padding: 10px 20px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            -webkit-tap-highlight-color: transparent;
        }

        .choice-btn:hover, .choice-btn:active {
            color: #ff9d00; /* Оранжевый цвет Undertale при наведении/нажатии */
            border-color: #ff9d00;
        }
    </style>
</head>
<body>

    <div class="character-container" onclick="handleCharaClick()">
        <img src="Chara.png" alt="Chara">
    </div>

    <div class="textbox" id="dialogBox" onclick="advanceDialog()">
        <p class="text-content" id="dialogText"></p>
    </div>

    <!-- Кнопки выбора -->
    <div class="choices-container" id="choicesBox">
        <button class="choice-btn" onclick="makeChoice('erase')">[ СТЕРЕТЬ ]</button>
        <button class="choice-btn" onclick="makeChoice('do_not')">[ НЕ СТЕРЕТЬ ]</button>
    </div>

    <script>
        // Оригинальный звук скримера Чары
        const screamSound = new Audio("https://soundboard.com");

        const phrases = [
            "* Приветствую.",
            "* Я Чара.",
            "* Спасибо тебе.",
            "* Твоя сила пробудила меня от смерти.",
            "* Давай сотрем этот бесполезный мир..."
        ];

        let currentLine = 0;
        let isTyping = false;
        let typingTimeout;
        let dialogStarted = false;
        let isChoicePhase = false;

        const dialogBox = document.getElementById('dialogBox');
        const dialogText = document.getElementById('dialogText');
        const choicesBox = document.getElementById('choicesBox');

        function typeText(text, index = 0, callback = null) {
            if (index < text.length) {
                isTyping = true;
                dialogText.textContent += text[index];
                typingTimeout = setTimeout(() => typeText(text, index + 1, callback), 40);
            } else {
                isTyping = false;
                if (callback) callback();
            }
        }

        function handleCharaClick() {
            if (isChoicePhase) return; // Блокируем клики по Чаре во время выбора
            
            if (!dialogStarted) {
                dialogStarted = true;
                dialogBox.style.display = "block";
                choicesBox.style.display = "none";
                dialogText.textContent = "";
                currentLine = 0;
                typeText(phrases[0]);
            } else {
                advanceDialog();
            }
        }

        function advanceDialog() {
            if (isChoicePhase) return;

            if (isTyping) {
                clearTimeout(typingTimeout);
                dialogText.textContent = phrases[currentLine];
                isTyping = false;
                
                // Если это была последняя фраза, сразу показываем кнопки
                if (currentLine === phrases.length - 1) {
                    showChoices();
                }
                return;
            }

            currentLine++;

            if (currentLine < phrases.length) {
                dialogText.textContent = "";
                typeText(phrases[currentLine], 0, () => {
                    // Если допечатали до последней фразы — выводим меню выбора
                    if (currentLine === phrases.length - 1) {
                        showChoices();
                    }
                });
            }
        }

        function showChoices() {
            isChoicePhase = true;
            choicesBox.style.display = "flex";
        }

        function makeChoice(answer) {
            choicesBox.style.display = "none"; // Прячем кнопки обратно
            dialogText.textContent = "";

            if (answer === 'erase') {
                // Ветка: СТЕРЕТЬ
                typeText("* Именно. Ты отличный партнер.", 0, () => {
                    setTimeout(() => {
                        screamSound.play(); // Скример
                        document.body.style.backgroundColor = "red"; // Красная вспышка
                        dialogBox.style.display = "none";
                        
                        setTimeout(() => {
                            document.body.style.backgroundColor = "black";
                            resetGame();
                        }, 2000);
                    }, 1000);
                });
            } else {
                // Ветка: НЕ СТЕРЕТЬ
                typeText("* Нет?...", 0, () => {
                    setTimeout(() => {
                        dialogText.textContent = "";
                        typeText("* С каких это пор ты здесь главный?", 0, () => {
                            setTimeout(() => {
                                screamSound.play(); // Скример все равно бьет
                                document.body.style.backgroundColor = "darkred";
                                dialogBox.style.display = "none";
                                
                                setTimeout(() => {
                                    document.body.style.backgroundColor = "black";
                                    resetGame();
                                }, 2000);
                            }, 1000);
                        });
                    }, 1500);
                });
            }
        }

        function resetGame() {
            currentLine = 0;
            isTyping = false;
            dialogStarted = false;
            isChoicePhase = false;
            dialogBox.style.display = "none";
            choicesBox.style.display = "none";
        }
    </script>
</body>
</html>
