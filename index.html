<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chara Final Cutscene</title>
    <style>
        body {
            margin: 0;
            background-color: black;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            user-select: none;
        }

        .shake-screen {
            animation: shake 0.05s infinite !important;
        }

        .flash-red {
            animation: flash 0.1s infinite !important;
        }

        @keyframes shake {
            0% { transform: translate(4px, 2px) rotate(0deg); }
            20% { transform: translate(-3px, -2px) rotate(-1deg); }
            40% { transform: translate(-5px, 0px) rotate(1deg); }
            60% { transform: translate(0px, 4px) rotate(0deg); }
            80% { transform: translate(3px, -2px) rotate(1deg); }
            100% { transform: translate(-2px, 3px) rotate(-1deg); }
        }

        @keyframes flash {
            0% { background-color: #ff0000; }
            50% { background-color: #000000; }
            100% { background-color: #550000; }
        }

        .character-container {
            cursor: pointer;
            margin-bottom: 30px;
            padding: 10px;
            -webkit-tap-highlight-color: transparent;
        }

        img {
            image-rendering: pixelated;
            width: 140px;
            height: auto;
            display: block;
            pointer-events: none;
        }

        .textbox {
            width: 85%;
            max-width: 500px;
            min-height: 120px;
            border: 4px solid white;
            background-color: black;
            padding: 15px;
            box-sizing: border-box;
            display: none;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .text-content {
            color: white;
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 1px;
            line-height: 1.4;
            margin: 0;
            white-space: pre-wrap;
        }

        .choices-container {
            display: none;
            justify-content: space-around;
            width: 85%;
            max-width: 500px;
            margin-top: 20px;
        }

        .choice-btn {
            background-color: black;
            color: white;
            border: 2px solid white;
            padding: 10px 20px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            -webkit-tap-highlight-color: transparent;
        }

        .choice-btn:hover, .choice-btn:active {
            color: #ff9d00;
            border-color: #ff9d00;
        }
    </style>
</head>
<body>

    <div class="character-container" onclick="handleCharaClick()">
        <img src="Chara.png" alt="Chara">
    </div>

    <div class="textbox" id="dialogBox" onclick="handleDialogClick()">
        <p class="text-content" id="dialogText"></p>
    </div>

    <div class="choices-container" id="choicesBox">
        <button class="choice-btn" onclick="makeChoice('erase')">[ СТЕРЕТЬ ]</button>
        <button class="choice-btn" onclick="makeChoice('do_not')">[ НЕ СТЕРЕТЬ ]</button>
    </div>

    <script>
        const screamSound = new Audio("scream.mp3");
        screamSound.preload = "auto";

        const phrases = [
            "* Приветствую.",
            "* Я Чара.",
            "* Спасибо тебе.",
            "* Твоя сила пробудила меня от смерти.",
            "* Давай сотрем этот бесполезный мир..."
        ];

        let currentLine = 0;
        let isTyping = false;
        let typingTimeout;
        let dialogStarted = false;
        let isChoicePhase = false;
        
        let finalBranch = ""; 
        let finalStep = 0;

        const dialogBox = document.getElementById('dialogBox');
        const dialogText = document.getElementById('dialogText');
        const choicesBox = document.getElementById('choicesBox');

        function typeText(text, index = 0, callback = null) {
            if (index < text.length) {
                isTyping = true;
                dialogText.textContent += text[index];
                typingTimeout = setTimeout(() => typeText(text, index + 1, callback), 40);
            } else {
                isTyping = false;
                if (callback) callback();
            }
        }

        function handleCharaClick() {
            if (isChoicePhase) return;
            if (!dialogStarted) {
                dialogStarted = true;
                dialogBox.style.display = "block";
                choicesBox.style.display = "none";
                dialogText.textContent = "";
                currentLine = 0;
                typeText(phrases[0]); 
            } else {
                advanceDialog();
            }
        }

        function advanceDialog() {
            if (isChoicePhase) return;

            if (isTyping) {
                clearTimeout(typingTimeout);
                dialogText.textContent = phrases[currentLine];
                isTyping = false;
                if (currentLine === phrases.length - 1) showChoices();
                return;
            }

            currentLine++;

            if (currentLine < phrases.length) {
                dialogText.textContent = "";
                typeText(phrases[currentLine], 0, () => {
                    if (currentLine === phrases.length - 1) showChoices();
                });
            }
        }

        function showChoices() {
            isChoicePhase = true;
            choicesBox.style.display = "flex";
        }

        function makeChoice(answer) {
            choicesBox.style.display = "none";
            dialogText.textContent = "";
            finalBranch = answer;
            finalStep = 1;

            screamSound.volume = 0;
            screamSound.play().then(() => {
                screamSound.pause();
                screamSound.currentTime = 0;
            }).catch(e => console.log(e));

            if (answer === 'erase') {
                typeText("* Именно. Ты отличный партнер.");
            } else {
                typeText("* Нет?...");
            }
        }

        function handleDialogClick() {
            if (!isChoicePhase) {
                advanceDialog();
                return;
            }

            if (isTyping) {
                clearTimeout(typingTimeout);
                if (finalBranch === 'erase') {
                    dialogText.textContent = "* Именно. Ты отличный партнер.";
                } else if (finalBranch === 'do_not' && finalStep === 1) {
                    dialogText.textContent = "* Нет?...";
                } else if (finalBranch === 'do_not' && finalStep === 2) {
                    dialogText.textContent = "* С каких это пор ты здесь главный?";
                }
                isTyping = false;
                return;
            }

            if (finalBranch === 'erase' && finalStep === 1) {
                triggerChaos();
            } else if (finalBranch === 'do_not') {
                if (finalStep === 1) {
                    finalStep = 2;
                    dialogText.textContent = "";
                    typeText("* С каких это пор ты здесь главный?");
                } else if (finalStep === 2) {
                    triggerChaos();
                }
            }
        }

        function triggerChaos() {
            // 1. Мгновенно даем команду на старт звука
            screamSound.volume = 1;
            screamSound.play().catch(err => console.log(err));
            
            // 2. Скрываем диалоги
            dialogBox.style.display = "none";
            choicesBox.style.display = "none";
            
            // 3. Задерживаем вспышки на 250 мс, чтобы они совпали со звуком из динамика
            setTimeout(() => {
                document.body.classList.add("flash-red");
                document.body.classList.add("shake-screen");
            }, 250);

            // 4. ТАЙМЕР НАСТРОЕН НА 2 СЕКУНДЫ (2000 мс) общего кошмара
            setTimeout(() => {
                document.body.classList.remove("flash-red");
                document.body.classList.remove("shake-screen");
                document.body.style.backgroundColor = "black";
                resetGame();
            }, 2000); 
        }

        function resetGame() {
            currentLine = 0;
            isTyping = false;
            dialogStarted = false;
            isChoicePhase = false;
            finalBranch = "";
            finalStep = 0;
            dialogBox.style.display = "none";
            choicesBox.style.display = "none";
        }
    </script>
</body>
</html>
